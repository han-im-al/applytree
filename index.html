<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applytree - Job Tracker</title>
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="styles.css">
  
  <!-- Chart Libraries -->
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- ==========================================
       DASHBOARD SCREEN
       ========================================== -->
  <div id="dashboard-screen" class="app-container">
    
    <!-- Header -->
    <header class="main-header">
      <div class="header-logo">
        <i class="fa-solid fa-leaf logo-icon"></i>
        <div class="logo-text">
          <h1>Applytree</h1>
        </div>
      </div>
      
      <div class="header-actions">
        <!-- Copy Share Link -->
        <button id="btn-copy-link" class="btn btn-secondary" title="Copy Public Share Link">
          <i class="fa-regular fa-copy"></i>
          <span>Copy Link</span>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
      
      <!-- Compare Search Controls Widget -->
      <section class="log-card compare-card" id="compare-section" style="margin-bottom: 2rem;">
        <div class="card-header" style="border-bottom: none; margin-bottom: 0; padding-bottom: 0;">
          <h2><i class="fa-solid fa-user-friends"></i> Compare Stats Head-to-Head</h2>
        </div>
        
        <div class="compare-controls">
          <input type="text" id="compare-username-input" placeholder="Enter other candidate's username..." style="flex: 1; min-width: 250px;">
          <button id="btn-compare-submit" class="btn btn-primary">Compare</button>
          <button id="btn-compare-clear" class="btn btn-secondary" style="display: none;">Clear</button>
        </div>
      </section>

      <!-- ==========================================
           VIEW A: SINGLE USER DASHBOARD VIEW
           ========================================== -->
      <div id="single-user-view">
        <!-- Metrics Grid (Total Applied, Interviews) -->
        <section class="metrics-grid">
          <div class="metric-card applied">
            <div class="metric-icon">
              <i class="fa-solid fa-paper-plane"></i>
            </div>
            <div class="metric-info">
              <h3>Total Applied</h3>
              <div class="value" id="metric-total">0</div>
            </div>
          </div>
          
          <div class="metric-card interview">
            <div class="metric-icon">
              <i class="fa-solid fa-comments"></i>
            </div>
            <div class="metric-info">
              <h3>Interviews</h3>
              <div class="value" id="metric-interview">0 (0%)</div>
            </div>
          </div>
        </section>

        <!-- Visualizations Row -->
        <section class="visuals-grid">
          <div class="visual-card main-chart">
            <div class="chart-container-wrapper">
              <div id="sankey-chart" class="chart-container"></div>
            </div>
          </div>
          
          <div class="visual-card side-chart">
            <div class="chart-container-wrapper">
              <div class="chart-container">
                <canvas id="timeline-chart"></canvas>
              </div>
            </div>
          </div>
        </section>
      </div>

      <!-- ==========================================
           VIEW B: HEAD-TO-HEAD COMPARISON VIEW
           ========================================== -->
      <div id="comparison-view" style="display: none;">
        <div class="comparison-grid">
          
          <!-- Left Column (You) -->
          <div class="compare-column">
            <h3 class="compare-column-header" id="compare-header-you">You</h3>
            
            <!-- Metrics -->
            <div class="metrics-grid">
              <div class="metric-card applied">
                <div class="metric-icon"><i class="fa-solid fa-paper-plane"></i></div>
                <div class="metric-info">
                  <h3>Total Applied</h3>
                  <div class="value" id="compare-metrics-you-total">0</div>
                </div>
              </div>
              <div class="metric-card interview">
                <div class="metric-icon"><i class="fa-solid fa-comments"></i></div>
                <div class="metric-info">
                  <h3>Interviews</h3>
                  <div class="value" id="compare-metrics-you-interview">0 (0%)</div>
                </div>
              </div>
            </div>

            <!-- Sankey -->
            <div class="visual-card" style="margin-bottom: 1.5rem;">
              <div class="chart-container-wrapper" style="min-height: 350px;">
                <div id="compare-sankey-you" class="chart-container"></div>
              </div>
            </div>

            <!-- Timeline -->
            <div class="visual-card" style="margin-bottom: 1.5rem;">
              <div class="chart-container-wrapper" style="min-height: 350px;">
                <div class="chart-container">
                  <canvas id="compare-timeline-you"></canvas>
                </div>
              </div>
            </div>
          </div>

          <!-- Right Column (Them) -->
          <div class="compare-column">
            <h3 class="compare-column-header" id="compare-header-them">Them</h3>
            
            <!-- Metrics -->
            <div class="metrics-grid">
              <div class="metric-card applied">
                <div class="metric-icon"><i class="fa-solid fa-paper-plane"></i></div>
                <div class="metric-info">
                  <h3>Total Applied</h3>
                  <div class="value" id="compare-metrics-them-total">0</div>
                </div>
              </div>
              <div class="metric-card interview">
                <div class="metric-icon"><i class="fa-solid fa-comments"></i></div>
                <div class="metric-info">
                  <h3>Interviews</h3>
                  <div class="value" id="compare-metrics-them-interview">0 (0%)</div>
                </div>
              </div>
            </div>

            <!-- Sankey -->
            <div class="visual-card" style="margin-bottom: 1.5rem;">
              <div class="chart-container-wrapper" style="min-height: 350px;">
                <div id="compare-sankey-them" class="chart-container"></div>
              </div>
            </div>

            <!-- Timeline -->
            <div class="visual-card" style="margin-bottom: 1.5rem;">
              <div class="chart-container-wrapper" style="min-height: 350px;">
                <div class="chart-container">
                  <canvas id="compare-timeline-them"></canvas>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- Application Logs / Table Card -->
      <section class="log-card" style="margin-top: 1rem;">
        <div class="log-header">
          <div class="log-title-container">
            <h2><i class="fa-solid fa-table-list"></i> Application Log</h2>
            <p id="table-count-label">0 entries found</p>
          </div>
          
          <div class="log-controls">
            <!-- Search -->
            <div class="search-box">
              <i class="fa-solid fa-magnifying-glass search-icon"></i>
              <input type="text" id="table-search" placeholder="Search company or title...">
            </div>
            
            <!-- Filters -->
            <select id="table-filter-status" class="theme-select">
              <option value="ALL">All Statuses</option>
              <option value="Pending">Pending Only</option>
              <option value="Offer">Offers Only</option>
              <option value="Rejected">Rejections Only</option>
              <option value="Withdrawn">Withdrawn Only</option>
            </select>
            
            <!-- Add App Trigger -->
            <button id="btn-add-application" class="btn btn-primary">
              <i class="fa-solid fa-plus"></i>
              <span>Add Job</span>
            </button>
          </div>
        </div>

        <!-- Table Container -->
        <div class="table-container">
          <table class="dashboard-table">
            <thead>
              <tr>
                <th>Company & Position</th>
                <th>Applied Date</th>
                <th>Pipeline Status</th>
                <th>Decision Status</th>
                <th class="actions-col">Actions</th>
              </tr>
            </thead>
            <tbody id="applications-table-body">
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
      </section>
      
    </main>
  </div>

  <!-- ==========================================
       MODAL: ADD / EDIT APPLICATION
       ========================================== -->
  <div id="modal-application" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-title">Add Job Application</h2>
        <button class="modal-close btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
      </div>
      
      <form id="form-application" class="modal-form">
        <input type="hidden" id="form-app-id">
        
        <div class="form-row split">
          <div class="form-group">
            <label for="form-company">Company <span class="required">*</span></label>
            <input type="text" id="form-company" required placeholder="e.g., Google">
          </div>
          <div class="form-group">
            <label for="form-title">Job Title <span class="required">*</span></label>
            <input type="text" id="form-title" required placeholder="e.g., Software Engineer">
          </div>
        </div>

        <div class="form-row split">
          <div class="form-group">
            <label for="form-applied-date">Applied Date <span class="required">*</span></label>
            <input type="date" id="form-applied-date" required>
          </div>
        </div>

        <div class="form-row split">
          <!-- Pipeline Status -->
          <div class="form-group">
            <label for="form-pipeline-status">Pipeline Status <span class="required">*</span></label>
            <select id="form-pipeline-status">
              <option value="Applied">Applied</option>
              <option value="Online Assessment">Online Assessment</option>
              <option value="Interview">Interview</option>
            </select>
          </div>
          
          <!-- Decision Status -->
          <div class="form-group">
            <label for="form-decision">Decision Status <span class="required">*</span></label>
            <select id="form-decision">
              <option value="Pending">Pending</option>
              <option value="Offer">Offer</option>
              <option value="Rejected">Rejected</option>
              <option value="Withdrawn">Withdrawn</option>
            </select>
          </div>
        </div>

        <!-- Actions -->
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-close-modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btn-save-app">Save Application</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Script Load -->
  <script src="dashboard.js"></script>
</body>
</html>
